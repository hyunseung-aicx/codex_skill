name: Setup Score

on:
  push:
    branches: [main]
    paths:
      - 'hooks/**'
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - 'rules/**'
      - 'CLAUDE.md'
      - 'settings.local.json'
      - '.claude-plugin/**'
      - 'scripts/score-setup.sh'
      - '!README.md'  # 배지 auto-commit 재귀 트리거 방지
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # README.md 배지 자동 커밋/푸시 용도
  pull-requests: write  # PR 코멘트 작성 용도

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run score-setup.sh
        id: score
        run: |
          bash scripts/score-setup.sh | tee score.txt
          bash scripts/score-setup.sh --json > score.json

          # 핵심 수치 추출 (GitHub Actions output)
          TOTAL=$(python -c "import json; print(json.load(open('score.json'))['total'])")
          GRADE=$(python -c "import json; print(json.load(open('score.json'))['grade'])")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"

      - name: Validate marketplace.json against official schema
        run: |
          python - <<'PY'
          import json, sys
          with open('.claude-plugin/marketplace.json', encoding='utf-8') as f:
              m = json.load(f)
          required_root = ['$schema', 'name', 'plugins']
          missing = [k for k in required_root if k not in m]
          if missing:
              print(f'[FAIL] marketplace.json missing: {missing}')
              sys.exit(1)
          schema_url = m['$schema']
          if 'anthropic.com/claude-code/marketplace' not in schema_url:
              print(f'[FAIL] $schema must reference anthropic.com: got {schema_url}')
              sys.exit(1)
          if not m['plugins'] or not isinstance(m['plugins'], list):
              print('[FAIL] plugins must be non-empty array')
              sys.exit(1)
          for p in m['plugins']:
              for req in ['name', 'source', 'category', 'description']:
                  if req not in p:
                      print(f'[FAIL] plugin missing {req}: {p.get("name", "?")}')
                      sys.exit(1)
          print(f'[OK] marketplace.json: {len(m["plugins"])} plugin(s) valid')
          PY

      - name: Upload score artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup-score-${{ github.sha }}
          path: |
            score.txt
            score.json
          retention-days: 90

      - name: Comment PR with score (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const scoreText = fs.readFileSync('score.txt', 'utf8');
            const body = `## 📊 Setup Score\n\n\`\`\`\n${scoreText}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Update README badge (main only)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          TOTAL: ${{ steps.score.outputs.total }}
          GRADE: ${{ steps.score.outputs.grade }}
        run: |
          # 배지 URL: img.shields.io
          COLOR=brightgreen
          case "$GRADE" in
            S|A+) COLOR=brightgreen ;;
            A|A-) COLOR=green ;;
            B+|B) COLOR=yellowgreen ;;
            *) COLOR=orange ;;
          esac
          BADGE="![Setup Score](https://img.shields.io/badge/setup_score-${TOTAL}%2F1000%20(${GRADE//+/%2B})-${COLOR}?style=flat-square)"

          # README.md 최상단에 배지 삽입/갱신 (기존 Setup Score 배지 라인 제거 후 삽입)
          python - <<PY
          import re
          with open('README.md', encoding='utf-8') as f: content = f.read()
          badge = """$BADGE"""
          # 기존 Setup Score 배지 제거
          content = re.sub(r'^\!\[Setup Score\].*\n', '', content, flags=re.MULTILINE)
          # 첫 H1 뒤에 삽입
          lines = content.split('\n')
          for i, line in enumerate(lines):
              if line.startswith('# '):
                  lines.insert(i + 1, '')
                  lines.insert(i + 2, badge)
                  break
          with open('README.md', 'w', encoding='utf-8') as f: f.write('\n'.join(lines))
          print(f'[OK] Badge updated to {badge}')
          PY

          # 변경 있으면 commit
          if ! git diff --quiet README.md; then
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            git add README.md
            git commit -m "chore(ci): update setup score badge to ${TOTAL}/${GRADE}"
            git push
          fi
