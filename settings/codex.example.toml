# Codex example config fragment for this unified skillpack.
# Merge carefully into ~/.codex/config.toml; do not paste blindly over existing auth,
# marketplace, plugin, project, or MCP settings.

model = "gpt-5.5"
model_reasoning_effort = "high"

[features]
goals = true

# Keep repository-level AGENTS.md as the main project context mechanism.
# Add per-project trust entries through Codex UI/CLI rather than copying them here.

# Example OpenTelemetry skeleton.
# Choose your own exporter endpoint before enabling.
# [otel]
# log_user_prompt = true
# environment = "local"
#
# [otel.exporter.otlp-http]
# endpoint = "http://127.0.0.1:4318/v1/logs"

# Example safety posture:
# - Keep network restricted by default.
# - Use approvals for external writes, package installs, deployment, and destructive actions.
# - Prefer read-only MCP connectors until write workflows are explicitly reviewed.

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--browser=chrome", "--isolated", "--caps=testing,storage,vision,network"]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--isolated=true", "--no-usage-statistics"]

[mcp_servers.figma-desktop]
url = "http://127.0.0.1:3845/mcp"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/sinhyeonseung/Desktop/aicx-repos"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"

[mcp_servers.prisma-local]
command = "npx"
args = ["-y", "prisma", "mcp"]

