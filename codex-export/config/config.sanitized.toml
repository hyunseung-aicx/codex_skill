# Sanitized copy of ~/.codex/config.toml
# Secrets, auth state, sessions, logs, and caches are not included.

model = "gpt-5.5"
model_reasoning_effort = "high"

[marketplaces.openai-bundled]
last_updated = "2026-05-13T02:51:23Z"
source_type = "local"
source = "$CODEX_HOME/.tmp/bundled-marketplaces/openai-bundled"

[marketplaces.openai-primary-runtime]
last_updated = "2026-05-13T04:57:14Z"
source_type = "local"
source = "$HOME/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[projects."$HOME/Documents/Codex/2026-05-13/new-chat"]
trust_level = "trusted"

[projects."$HOME"]
trust_level = "trusted"

[projects."$HOME/Desktop/aicx-repos"]
trust_level = "trusted"

[projects."$HOME/Desktop/aicx-repos/chatbot-v2"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4

[mcp_servers.atlassian]
url = "https://mcp.atlassian.com/v1/mcp/authv2"

[mcp_servers.slack]
command = "$CODEX_HOME/bin/slack-mcp"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--browser=chrome", "--isolated", "--caps=testing,storage,vision,network"]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--isolated=true", "--no-usage-statistics"]

[mcp_servers.figma-desktop]
url = "http://127.0.0.1:3845/mcp"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "$HOME/Desktop/aicx-repos"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"

[mcp_servers.prisma-local]
command = "npx"
args = ["-y", "prisma", "mcp"]
